name: universally
description: It depends on universally plug and can update the latest available version in time
version: 9.4.1
repository: https://github.com/Wayaer/universally.git

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  permission_handler:
    git:
      url: https://gitcode.com/openharmony-sig/flutter_permission_handler
      path: permission_handler
  path_provider:
    git:
      url: https://gitcode.com/openharmony-tpc/flutter_packages
      path: packages/path_provider/path_provider
  url_launcher:
    git:
      url: https://gitcode.com/openharmony-tpc/flutter_packages
      path: packages/url_launcher/url_launcher
  package_info_plus:
    git:
      url: https://gitcode.com/openharmony-sig/flutter_plus_plugins.git
      path: packages/package_info_plus/package_info_plus
  connectivity_plus:
    git:
      url: https://gitcode.com/openharmony-sig/flutter_plus_plugins.git
      path: packages/connectivity_plus/connectivity_plus
  android_intent_plus: ^5.3.1
  device_info_plus:
    git:
      url: https://gitcode.com/openharmony-sig/flutter_plus_plugins.git
      path: packages/device_info_plus/device_info_plus
  shared_preferences:
    git:
      url: https://gitcode.com/openharmony-tpc/flutter_packages
      path: packages/shared_preferences/shared_preferences

  extended_image: ^9.1.0
  extended_image_library: ^4.0.6
  window_manager: ^0.5.1
  flutter_curiosity: ^6.8.0

  path: ^1.9.0
  provider: ^6.1.5
  flutter_svg: ^2.2.0
  async: ^2.13.0
  decimal: ^3.2.4
  flutter_spinkit: ^5.2.2
  keframe: ^3.0.0

  flutter_waya: ^11.3.0
  fl_extended: ^1.9.1
  fl_list_wheel: ^0.0.3
  fl_scroll_view: ^1.0.1
  fl_dio: ^1.5.1

dependency_overrides:
  path_provider:
    git:
      url: https://gitcode.com/openharmony-tpc/flutter_packages
      path: packages/path_provider/path_provider

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Universally
      fonts:
        - asset: assets/Universally.ttf